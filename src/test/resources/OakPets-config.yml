# ============================================================
#                        OAKPETS
#    Custom cosmetic pet companion system with ModelEngine.
# ============================================================

# ============================================================
# GENERAL SETTINGS
# ============================================================
debug: false

# How often player settings (favorites, sort mode, etc.) are saved
# to the database in seconds. Lower = more frequent writes.
batch-write-interval: 300

# ============================================================
# FOLLOW BEHAVIOR
# ============================================================
follow:
  distance: 4           # blocks before pet starts moving toward owner
  teleport-distance: 10 # blocks before pet teleports instantly
  tick-interval: 10     # ticks between follow checks (10 = 0.5s)

# ============================================================
# SEASONAL FEATURES
# ============================================================
seasonal:
  santa-hat:
    enabled: true
    start: "12-01"  # MM-DD format
    end: "01-05"    # wraps across year boundary

# ============================================================
# CATEGORIES
# ============================================================
categories:
  rank-pets:
    display-name: "Rank Pets"
    material: GOLD_INGOT
    sort-order: 1
  mob-pets:
    display-name: "Mob Pets"
    material: ZOMBIE_HEAD
    sort-order: 2
  crate-pets:
    display-name: "Crate Pets"
    material: CHEST
    sort-order: 3

# ============================================================
# GUI SETTINGS
# ============================================================
gui:
  title: "бҙҳбҙҮбҙӣкңұ"
  max-pet-rows: 5
  open-sound: "ui.button.click"
  click-sound: "ui.button.click"
  items:
    filler:
      material: GRAY_STAINED_GLASS_PANE
    previous-page:
      slot: 0
      material: ARROW
      name: "<#E5C5D0>Previous Page"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўбҙҸ КҷбҙҖбҙ„бҙӢ]"
    sort:
      slot: 1
      material: HOPPER
      name: "<#E5C5D0>Sort: <#f2ebd7><mode>"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ„КҸбҙ„КҹбҙҮ]"
    reverse:
      slot: 2
      ascending-material: AMETHYST_SHARD
      descending-material: PRISMARINE_SHARD
      ascending-label: "Ascending"
      descending-label: "Descending"
      name: "<#E5C5D0>Order: <#f2ebd7><direction>"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙӣбҙҸЙўЙўКҹбҙҮ]"
    page-indicator:
      slot: 3
      material: PAPER
      name: "<#6C757D>Page <#f2ebd7><current><#6C757D>/<#f2ebd7><total>"
      lore: []
    clear-pet:
      slot: 4
      material: BARRIER
      name: "<#C27B6B>Despawn Pet"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ…бҙҮкңұбҙҳбҙҖбҙЎЙҙ]"
    filter:
      slot: 6
      all-material: PINK_STAINED_GLASS_PANE
      favorites-material: GLOW_INK_SAC
      name: "<#E5C5D0>Filter: <#f2ebd7><mode>"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ„КҸбҙ„КҹбҙҮ]"
    next-page:
      slot: 8
      material: ARROW
      name: "<#E5C5D0>Next Page"
      lore:
        - "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўбҙҸ кң°бҙҸКҖбҙЎбҙҖКҖбҙ…]"
  sort-names:
    category: "Category"
    alphabetical: "A-Z"
    most-claimed: "Most Claimed"
  filter-names:
    all: "All"
    favorites: "Favorites"
  # Pet item lore template
  # Available placeholders: <favorite>, <pet_lore>, <claim_line>,
  #   <left_click>, <right_click>, <count>
  # Empty lines after placeholder resolution are removed
  pet-lore:
    layout:
      - "<favorite>"
      - "<status>"
      - "<pet_lore>"
      - ""
      - "<claim_line>"
      - ""
      - "<left_click>"
      - "<right_click>"
    claim-line: "<#6C757D>бҙҸбҙЎЙҙбҙҮбҙ… КҷКҸ <#FCD472><count> <#6C757D>бҙҳКҹбҙҖКҸбҙҮКҖкңұ"
    status-active: "<#8FAA87>бҙҖбҙ„бҙӣЙӘбҙ бҙҮ"
    left-click-summon: "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ кңұбҙңбҙҚбҙҚбҙҸЙҙ]"
    left-click-despawn: "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙ…бҙҮкңұбҙҳбҙҖбҙЎЙҙ]"
    right-click-favorite: "<#FCD472>[КҖЙӘЙўКңбҙӣ-бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ кң°бҙҖбҙ бҙҸКҖЙӘбҙӣбҙҮ]"
    right-click-unfavorite: "<#FCD472>[КҖЙӘЙўКңбҙӣ-бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ бҙңЙҙкң°бҙҖбҙ бҙҸКҖЙӘбҙӣбҙҮ]"
    favorite-indicator: "<#FCD472>вҳ… кң°бҙҖбҙ бҙҸКҖЙӘбҙӣбҙҮ"

# ============================================================
# ADMIN GUI (for /pets <player>)
# ============================================================
admin-gui:
  title: "Pets: <player>"
  locked-material: RED_STAINED_GLASS_PANE
  # Available placeholders: <status>, <pet_lore>, <pet_id>, <click_action>, <count>
  pet-lore:
    layout:
      - "<status>"
      - "<#6C757D>ЙӘбҙ…: <#FCD472><pet_id>"
      - "<pet_lore>"
      - ""
      - "<click_action>"
    status:
      unlocked: "<#8FAA87>бҙңЙҙКҹбҙҸбҙ„бҙӢбҙҮбҙ…"
      locked: "<#C27B6B>КҹбҙҸбҙ„бҙӢбҙҮбҙ…"
    click-action:
      grant: "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ ЙўКҖбҙҖЙҙбҙӣ]"
      revoke: "<#FCD472>[бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ КҖбҙҮбҙ бҙҸбҙӢбҙҮ]"
      permission-unlocked: "<#6C757D>бҙҚбҙҖЙҙбҙҖЙўбҙҮбҙ… КҷКҸ бҙҳбҙҮКҖбҙҚЙӘкңұкңұЙӘбҙҸЙҙкңұ <#8FAA87>(КңбҙҖкңұ бҙҖбҙ„бҙ„бҙҮкңұкңұ)"
      permission-locked: "<#6C757D>бҙҚбҙҖЙҙбҙҖЙўбҙҮбҙ… КҷКҸ бҙҳбҙҮКҖбҙҚЙӘкңұкңұЙӘбҙҸЙҙкңұ <#C27B6B>(ЙҙбҙҸ бҙҖбҙ„бҙ„бҙҮкңұкңұ)"
      permission-offline: "<#6C757D>бҙҚбҙҖЙҙбҙҖЙўбҙҮбҙ… КҷКҸ бҙҳбҙҮКҖбҙҚЙӘкңұкңұЙӘбҙҸЙҙкңұ <#D89B6A>(бҙҸкң°кң°КҹЙӘЙҙбҙҮ)"

# ============================================================
# VOUCHER DEFAULTS
# ============================================================
# Default appearance for pet voucher items.
# Individual pets can override these in their voucher section.
voucher:
  material: NAME_TAG
  name: "<#E5C5D0><pet_name> <#f2ebd7>Pet Voucher"
  lore:
    - "<#f2ebd7>КҖбҙҮбҙ…бҙҮбҙҮбҙҚ бҙӣбҙҸ бҙңЙҙКҹбҙҸбҙ„бҙӢ бҙӣКңЙӘкңұ бҙҳбҙҮбҙӣ."
    - ""
    - "<#FCD472>[КҖЙӘЙўКңбҙӣ-бҙ„КҹЙӘбҙ„бҙӢ бҙӣбҙҸ КҖбҙҮбҙ…бҙҮбҙҮбҙҚ]"
  glow: true

# ============================================================
# CONFIRM GUI (voucher redemption)
# ============================================================
confirm-gui:
  title: "Confirm Redemption"
  size: 27
  filler:
    material: GRAY_STAINED_GLASS_PANE
  confirm:
    slot: 11
    material: LIME_STAINED_GLASS_PANE
    name: "<#8FAA87>Confirm"
    lore: []
  deny:
    slot: 15
    material: RED_STAINED_GLASS_PANE
    name: "<#C27B6B>Cancel"
    lore: []
  pet-info:
    slot: 13

# ============================================================
# MESSAGES
# ============================================================
# MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders: <pet_name> - Pet display name, <player> - Player name
# Set text to "" to disable individual messages
# Display modes: chat, action_bar
messages:
  pet-summoned:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>кңұбҙңбҙҚбҙҚбҙҸЙҙбҙҮбҙ… <#E5C5D0><pet_name><#f2ebd7>!"
    display: chat
  pet-despawned:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>бҙ…бҙҮкңұбҙҳбҙҖбҙЎЙҙбҙҮбҙ… <#E5C5D0><pet_name><#f2ebd7>."
    display: chat
  pet-respawned:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>КҸбҙҸбҙңКҖ <#E5C5D0><pet_name> <#f2ebd7>КңбҙҖкңұ КҖбҙҮбҙӣбҙңКҖЙҙбҙҮбҙ…!"
    display: chat
  pet-granted:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>КҸбҙҸбҙң бҙңЙҙКҹбҙҸбҙ„бҙӢбҙҮбҙ… <#E5C5D0><pet_name><#f2ebd7>!"
    display: chat
  pet-already-owned:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>КҸбҙҸбҙң бҙҖКҹКҖбҙҮбҙҖбҙ…КҸ бҙҸбҙЎЙҙ бҙӣКңЙӘкңұ бҙҳбҙҮбҙӣ."
    display: chat
  pet-revoked-notify:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#C27B6B><pet_name> <#f2ebd7>КңбҙҖкңұ КҷбҙҮбҙҮЙҙ КҖбҙҮбҙ бҙҸбҙӢбҙҮбҙ…."
    display: chat
  no-pets-available:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#C27B6B>КҸбҙҸбҙң бҙ…бҙҸЙҙ'бҙӣ КңбҙҖбҙ бҙҮ бҙҖЙҙКҸ бҙҳбҙҮбҙӣкңұ бҙңЙҙКҹбҙҸбҙ„бҙӢбҙҮбҙ…."
    display: chat
  spawn-failed:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>кң°бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ кңұбҙҳбҙҖбҙЎЙҙ бҙҳбҙҮбҙӣ. бҙ„КңбҙҮбҙ„бҙӢ бҙ„бҙҸЙҙкңұбҙҸКҹбҙҮ."
    display: chat
  no-active-pet:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>КҸбҙҸбҙң бҙ…бҙҸЙҙ'бҙӣ КңбҙҖбҙ бҙҮ бҙҖЙҙ бҙҖбҙ„бҙӣЙӘбҙ бҙҮ бҙҳбҙҮбҙӣ."
    display: chat
  rename-prompt:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>бҙӣКҸбҙҳбҙҮ бҙҖ ЙҙбҙҮбҙЎ ЙҙбҙҖбҙҚбҙҮ ЙӘЙҙ бҙ„КңбҙҖбҙӣ, бҙҸКҖ <#FCD472>cancel <#f2ebd7>бҙӣбҙҸ бҙ„бҙҖЙҙбҙ„бҙҮКҹ."
    display: chat
  rename-success:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>бҙҳбҙҮбҙӣ КҖбҙҮЙҙбҙҖбҙҚбҙҮбҙ… бҙӣбҙҸ <#E5C5D0><pet_name><#f2ebd7>!"
    display: chat
  rename-cancelled:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>КҖбҙҮЙҙбҙҖбҙҚбҙҮ бҙ„бҙҖЙҙбҙ„бҙҮКҹКҹбҙҮбҙ…."
    display: chat
  rename-invalid:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>ЙҙбҙҖбҙҚбҙҮ бҙ„бҙҖЙҙЙҙбҙҸбҙӣ КҷбҙҮ бҙҮбҙҚбҙҳбҙӣКҸ."
    display: chat
  name-reset:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>ЙҙбҙҖбҙҚбҙҮ КҖбҙҮкңұбҙҮбҙӣ кң°бҙҸКҖ <#E5C5D0><pet_name><#f2ebd7>."
    display: chat
  rename-too-long:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>ЙҙбҙҖбҙҚбҙҮ бҙҚбҙңкңұбҙӣ КҷбҙҮ <#FCD472><max_length> <#C27B6B>бҙ„КңбҙҖКҖбҙҖбҙ„бҙӣбҙҮКҖкңұ бҙҸКҖ КҹбҙҮкңұкңұ."
    display: chat
  # Favorite messages
  pet-favorited:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>Added to favorites."
    display: action_bar
  pet-unfavorited:
    text: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>Removed from favorites."
    display: action_bar
  # Voucher messages
  voucher-invalid:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>бҙӣКңЙӘкңұ бҙ бҙҸбҙңбҙ„КңбҙҮКҖ ЙӘкңұ ЙҙбҙҸ КҹбҙҸЙҙЙўбҙҮКҖ бҙ бҙҖКҹЙӘбҙ…."
    display: chat
  voucher-not-found:
    text: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>бҙ бҙҸбҙңбҙ„КңбҙҮКҖ ЙҙбҙҸбҙӣ кң°бҙҸбҙңЙҙбҙ… ЙӘЙҙ КҸбҙҸбҙңКҖ КңбҙҖЙҙбҙ…."
    display: chat
  # Command messages (flat strings, always chat)
  commands:
    reload-success: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#8FAA87>бҙ„бҙҸЙҙкң°ЙӘЙўбҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ КҖбҙҮКҹбҙҸбҙҖбҙ…бҙҮбҙ…."
    reload-failed: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>бҙ„бҙҸЙҙкң°ЙӘЙўбҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ КҖбҙҮКҹбҙҸбҙҖбҙ… кң°бҙҖЙӘКҹбҙҮбҙ…. бҙ„КңбҙҮбҙ„бҙӢ бҙ„бҙҸЙҙкңұбҙҸКҹбҙҮ."
    pet-not-found: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>бҙҳбҙҮбҙӣ ЙҙбҙҸбҙӣ кң°бҙҸбҙңЙҙбҙ…."
    player-not-found: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>бҙҳКҹбҙҖКҸбҙҮКҖ ЙҙбҙҸбҙӣ кң°бҙҸбҙңЙҙбҙ…."
    give-success: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>ЙўКҖбҙҖЙҙбҙӣбҙҮбҙ… <#E5C5D0><pet_name> <#f2ebd7>бҙӣбҙҸ <#FCD472><player><#f2ebd7>."
    give-failed: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>кң°бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ ЙўКҖбҙҖЙҙбҙӣ <pet_name> бҙӣбҙҸ <player>."
    revoke-success: "<#6C757D>[<#E5C5D0>бҙҳбҙҮбҙӣкңұ<#6C757D>] <#f2ebd7>КҖбҙҮбҙ бҙҸбҙӢбҙҮбҙ… <#E5C5D0><pet_name> <#f2ebd7>кң°КҖбҙҸбҙҚ <#FCD472><player><#f2ebd7>."
    revoke-failed: "<#6C757D>[<#C27B6B>бҙҮКҖКҖбҙҸКҖ<#6C757D>] <#C27B6B>кң°бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ КҖбҙҮбҙ бҙҸбҙӢбҙҮ <pet_name> кң°КҖбҙҸбҙҚ <player>."
