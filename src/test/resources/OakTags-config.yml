    help-voucher: "<#6C757D>  /tags voucher <tag> [player] [amount] [silent] <#f2ebd7>- Give vouchers"
    help-list: "<#6C757D>  /tags list [player] <#f2ebd7>- List unlocked tags"
    help-admin: "<#6C757D>  /tags <player> <#f2ebd7>- Admin tag management"
    admin-permission-managed: "<#6C757D>[<#6B7A5E>біЫбіА…ҐкЬ±<#6C757D>] <#D89B6A>This tag is managed by permissions."
