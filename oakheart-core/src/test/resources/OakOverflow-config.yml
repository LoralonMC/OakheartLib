# ============================================================
# ADVANCED SETTINGS
# ============================================================
advanced:
  # Debug mode (verbose logging)
  debug: false
  # Thread pool size for async operations
  async-threads: 2
  # Cache unclaimed counts (improves performance)
  cache:
    enabled: true
    # Cache duration in seconds
    duration: 30
  # Maximum items to fetch in a single query (prevents memory issues)
  # Set to -1 for unlimited (not recommended for production)
  max-query-limit: 10000

# ============================================================
#          DO NOT EDIT BELOW
# ============================================================
config-version: 1
