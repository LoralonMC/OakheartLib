    help-header: "<#6C757D>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n<#FCD472><bold>OakOverflow Admin</bold>\n<#6C757D>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    help-view: "<#FCD472>/oakoverflow view <#6C757D><<#f2ebd7>player<#6C757D>> <#6C757D>— <#f2ebd7>View a player's overflow"
    help-clear: "<#FCD472>/oakoverflow clear <#6C757D><<#f2ebd7>player<#6C757D>> <#6C757D>— <#f2ebd7>Clear a player's items"
    help-clearall: "<#FCD472>/oakoverflow clearall <#6C757D>— <#f2ebd7>Clear all items"
    help-stats: "<#FCD472>/oakoverflow stats <#6C757D>— <#f2ebd7>Database statistics"
