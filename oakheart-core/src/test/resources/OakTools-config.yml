      - CORNFLOWER
      - LILY_OF_THE_VALLEY
      - TORCHFLOWER
      - WITHER_ROSE
      - SUNFLOWER
      - LILAC
      - ROSE_BUSH
      - PEONY
    tiers:
      wooden:
        display-name: "Wooden Sickle"
        model-id: "nexo:wooden_sickle"
        radius: 0
        recipe:
          enabled: true
          category: EQUIPMENT
          shape:
            - " PP"
            - "  P"
            - " S "
          ingredients:
            P: "#planks"
            S: STICK
      stone:
