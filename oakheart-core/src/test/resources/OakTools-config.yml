# OakTools Configuration
# Missing config options are automatically added on plugin load

# ============================================================
# GENERAL SETTINGS
# ============================================================
general:
  debug: false
  # Warn players when tool durability drops below this percentage (0 to disable)
  durability-warning-threshold: 10
  restrictions:
    worlds:
      mode: BLACKLIST
      list:
        - example_disabled_world
        - example_minigames_world
    gamemode:
      creative:
        allow-use: true
        consume-blocks: false
        consume-durability: true
      adventure:
        allow-use: false
        consume-blocks: true
        consume-durability: true
      spectator:
        allow-use: false

# ============================================================
# TOOLS
# ============================================================
tools:
  file:
    enabled: true
    # Display name and lore (MiniMessage format)
    # Placeholders: <tool>, <cur> (damage taken), <max>, <remaining>, <percent>
    display:
      enabled: true
      name: "File"
      lore: []
    base-material: WARPED_FUNGUS_ON_A_STICK
    # Model settings (choose one format):
    #   Integer (e.g., 1001) -> Vanilla CustomModelData (legacy)
    #   "model:namespace:key" -> Modern Item Model (1.21.4+, recommended)
    #   "nexo:id" -> Nexo plugin
    #   "itemsadder:id" -> ItemsAdder plugin
    model-id: "nexo:file"
    durability:
      max: 250
      use-vanilla-damage-bar: true
      repair-material: IRON_INGOT
      repair-amount: 63  # 25% of max durability
    allowed-enchantments:
      - UNBREAKING
      - MENDING
    recipe:
      enabled: true
      category: EQUIPMENT
      shape:
        - "  I"
        - " I "
        - "S  "
      ingredients:
        I: IRON_INGOT
        S: STICK
    features:
      multiple-facing: true
      walls: true
      stairs: true
      directional: true
      axis-rotation: true
      slabs: true
    # Blocks the File tool will not interact with (right-click passes through)
    excluded-blocks:
      # Torches
      - TORCH
      - WALL_TORCH
      - SOUL_TORCH
      - SOUL_WALL_TORCH
      - REDSTONE_TORCH
      - REDSTONE_WALL_TORCH
