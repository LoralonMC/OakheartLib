      line: "Line"
    sounds:
      mode-switch: ui.button.click

  # ============================================================
  # HARVESTING TOOLS
  # ============================================================
  # Harvesting tools activate on block break (not right-click).
  # Sneak while breaking to mine a single block without activating.
  # Drops go directly to inventory; overflow to OakOverflow if installed.
  excavator:
    enabled: true
    # Display name and lore (MiniMessage format)
    # Placeholders: <tool>, <cur> (damage taken), <max>, <remaining>, <percent>
    display:
      enabled: true
      name: "<white>Excavation Shovel</white>"
      lore: []
    base-material: STONE_SHOVEL
    # Mining speed override (wood=2, stone=4, iron=6, diamond=8, netherite=9)
    # Set to 0 to use the base material's natural speed
    mining-speed: 4.0
    # Harvest level determines what blocks drop items (wood, stone, iron, diamond, netherite)
    # Set to "none" to use the base material's natural harvest level
    harvest-level: diamond
    model-id: ""
    durability:
      max: 500
      use-vanilla-damage-bar: true
      # Set to NONE to disable anvil repair
      repair-material: NONE
      repair-amount: 0
      # Set to true for infinite durability (no damage taken)
      unbreakable: false
    # Locked tool — no enchantments allowed (empty list blocks all)
    allowed-enchantments: []
    recipe:
      enabled: false
      category: EQUIPMENT
      shape:
        - " D "
        - " S "
        - " S "
      ingredients:
        D: DIAMOND
        S: STICK
    # Grid size (3 = 3x3, 5 = 5x5, etc. — must be odd)
    grid-size: 3
    # Ticks between each block break in the animation (1 = fastest)
    break-speed-ticks: 1
    # Show progress/completion action bar messages
    show-progress: true

  lumberjack:
    enabled: true
    display:
