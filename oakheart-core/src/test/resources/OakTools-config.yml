# ============================================================
# INTEGRATION SETTINGS
# ============================================================
# Protection plugins (WorldGuard, GriefPrevention, Towny, etc.) are detected automatically.
# Grant oaktools.bypass.protection to allow tool use in protected regions.
integration:
  coreprotect:
    enabled: true
    log-file-changes: true
    log-trowel-placements: true
    log-wand-placements: true
    log-harvesting-breaks: true

# ============================================================
# MESSAGES
# ============================================================
# MiniMessage format: https://docs.advntr.dev/minimessage/format.html
# Placeholders:
#   <player> - Player name        <tool> - Tool type name
#   <feed_source> - Feed source    <value> - Numeric value
#   <remaining> - Remaining uses   <max> - Max durability
# Set text to "" or command message to "" to disable individual messages
messages:
  # Tool usage messages
  protection-denied:
    text: "<#C27B6B>You cannot build here."
    display: action_bar
  no-placeable-blocks:
    text: "<#D89B6A>No placeable blocks in <#FCD472><feed_source><#D89B6A>."
    display: action_bar
  feed-source-changed:
    text: "<#f2ebd7>Feed source: <#FCD472><feed_source>"
    display: action_bar
  wand-placed:
    text: "<#8FAA87>Placed <#FCD472><count><#8FAA87> blocks."
    display: action_bar
  wand-mode-changed:
    text: "<#f2ebd7>Mode: <#FCD472><wand_mode>"
    display: action_bar
  wand-undo:
    text: "<#D89B6A>Undid <#FCD472><count><#D89B6A> blocks."
    display: action_bar
  wand-undo-empty:
    text: "<#C27B6B>Nothing to undo."
    display: action_bar
  gamemode-denied:
    text: "<#C27B6B>Tools cannot be used in this gamemode."
    display: action_bar
  world-denied:
    text: "<#C27B6B>Tools cannot be used in this world."
    display: action_bar
  no-permission:
    text: "<#C27B6B>You don't have permission to use this tool."
    display: action_bar
  craft-denied:
    text: "<#C27B6B>You don't have permission to craft this tool."
    display: action_bar
  tool-broken:
    text: "<#C27B6B>Your <#FCD472><tool><#C27B6B> has broken!"
    display: action_bar
  tool-low-durability:
    text: "<#D89B6A>Your <#FCD472><tool><#D89B6A> is low on durability! <#FCD472><remaining><#D89B6A>/<#FCD472><max><#D89B6A> remaining."
    display: action_bar
  # Harvesting tool messages
  excavator-breaking:
    text: "<#8FAA87>Excavating... <#FCD472><count><#8FAA87>/<#FCD472><total>"
    display: action_bar
  excavator-complete:
    text: "<#8FAA87>Excavated <#FCD472><count><#8FAA87> blocks."
    display: action_bar
  lumberjack-breaking:
    text: "<#8FAA87>Chopping... <#FCD472><count><#8FAA87>/<#FCD472><total>"
    display: action_bar
  lumberjack-complete:
    text: "<#8FAA87>Chopped <#FCD472><count><#8FAA87> blocks."
    display: action_bar
  veinminer-breaking:
    text: "<#8FAA87>Mining... <#FCD472><count><#8FAA87>/<#FCD472><total>"
    display: action_bar
  veinminer-complete:
    text: "<#8FAA87>Mined <#FCD472><count><#8FAA87> blocks."
    display: action_bar
  not-a-tree:
    text: "<#D89B6A>That doesn't appear to be a natural tree."
    display: action_bar
  no-ore-vein:
    text: "<#D89B6A>No connected ore vein found."
    display: action_bar
  operation-cancelled:
    text: "<#D89B6A>Mining operation cancelled."
    display: action_bar
  inventory-overflow:
    text: "<#D89B6A><count> items sent to overflow storage."
    display: action_bar
  sickle-harvested:
