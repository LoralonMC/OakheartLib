  # ============================================================
  # SICKLE — Crop Harvesting Tool
  # ============================================================
  # Vanilla-feel tiered tool. Harvests mature crops in an area and replants.
  # Uses vanilla durability, enchanting, repair — fully craftable.
  sickle:
    enabled: true
    # Vegetation types the sickle clears in an area (non-crop blocks)
    clearable-vegetation:
      - SHORT_GRASS
      - TALL_GRASS
      - FERN
      - LARGE_FERN
      - DEAD_BUSH
      - BUSH
      - DANDELION
      - POPPY
      - BLUE_ORCHID
      - ALLIUM
      - AZURE_BLUET
      - RED_TULIP
      - ORANGE_TULIP
      - WHITE_TULIP
      - PINK_TULIP
